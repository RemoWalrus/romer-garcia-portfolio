[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy Supabase Edge Functions through our domain
[[redirects]]
  from = "/api/*"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/:splat"
  status = 200
  force = true

# Route pages with custom OG meta through serve-index for social crawlers
[[redirects]]
  from = "/paradoxxia"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/serve-index?path=/paradoxxia"
  status = 200
  force = true

[[redirects]]
  from = "/char-gen"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/serve-index?path=/char-gen"
  status = 200
  force = true

[[redirects]]
  from = "/meme"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/serve-index?path=/meme"
  status = 200
  force = true

# Also serve homepage through serve-index for consistent OG tags
[[redirects]]
  from = "/"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/serve-index?path=/"
  status = 200
  force = true

# Handle SPA routing - send all other requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"