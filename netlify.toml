[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy Supabase Edge Functions through our domain
[[redirects]]
  from = "/api/*"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/:splat"
  status = 200
  force = true

# Route-specific SSR for social meta tags
[[edge_functions]]
  path = "/paradoxxia"
  function = "og-meta"

[[edge_functions]]
  path = "/char-gen"
  function = "og-meta"

[[edge_functions]]
  path = "/meme"
  function = "og-meta"

# Handle SPA routing - send all requests to index.html so React Router can handle them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
