[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy Supabase Edge Functions through our domain
[[redirects]]
  from = "/api/*"
  to = "https://xxigtbxqgbdcfpmnrzvp.supabase.co/functions/v1/:splat"
  status = 200
  force = true

# Route-specific SSR for social meta tags — 301 redirect so crawlers follow to serve-index
[[redirects]]
  from = "/paradoxxia"
  to = "/api/serve-index?path=/paradoxxia"
  status = 200
  force = true

[[redirects]]
  from = "/char-gen"
  to = "/api/serve-index?path=/char-gen"
  status = 200
  force = true

[[redirects]]
  from = "/meme"
  to = "/api/serve-index?path=/meme"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
